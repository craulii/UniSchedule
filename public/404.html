<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>UniSchedule</title>
  <script>
    // Redirect for GitHub Pages SPA support
    // With HashRouter this is rarely needed, but handles direct URL access
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 2).join('/') + '/#/' +
      l.pathname.slice(1).split('/').slice(1).join('/')
    );
  </script>
</head>
<body></body>
</html>
